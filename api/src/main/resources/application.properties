spring.application.name=api

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

# JWT Secret for signing authentication tokens
# MUST be at least 32 characters for security
# In Docker: set via JWT_SECRET environment variable
jwt.secret=${JWT_SECRET:YourVeryLongAndSecureSecretKeyForJWTSigningThatShouldBeAtLeast32Characters}

# Guacamole encryption key for RDP console connections
# MUST be exactly 32 characters long
# In Docker: set via GUACAMOLE_SECRET environment variable
guacamole.secret=${GUACAMOLE_SECRET:ThisIsA32CharacterLongSecretKey!}

# =============================================================================
# CORS CONFIGURATION
# =============================================================================

# Comma-separated list of authorized origins for CORS
# In Docker: set via CORS_AUTHORIZED environment variable
cores.authrized=${CORS_AUTHORIZED:http://localhost:3000,http://127.0.0.1:8080}

# =============================================================================
# WINRM CONFIGURATION
# =============================================================================

# WinRM port for connecting to Hyper-V servers (5985 for HTTP, 5986 for HTTPS)
# In Docker: set via WINRM_PORT environment variable
winrm.port=${WINRM_PORT:5985}

# =============================================================================
# STORAGE DIRECTORIES
# =============================================================================

# Paths to shared directories (mounted as volumes in Docker)
# In Docker: set via ISO_DIRECTORY, CONFIGURATION_DIRECTORY, HARDDRIVES_DIRECTORY
iso.directory=${ISO_DIRECTORY:D:\\\\ISOs}
configuration.directory=${CONFIGURATION_DIRECTORY:D:\\\\configurations}
harddrives.directory=${HARDDRIVES_DIRECTORY:D:\\harddrives}

# =============================================================================
# LDAP / ACTIVE DIRECTORY CONFIGURATION
# =============================================================================

# LDAP server URL (e.g., ldap://ad.example.com)
# In Docker: set via AD_URL environment variable
ad.url=ldap://${AD_URL:}

# Active Directory domain
# In Docker: set via AD_URL environment variable (defaults to AD_URL)
ad.domain=${AD_DOMAIN:${AD_URL:localhost}}

# Distinguished Name (base DN), e.g., DC=example,DC=com
# In Docker: set via AD_DN environment variable
ad.dn=${AD_DN:}

# Admin group CN (e.g., cn=AdminGroup)
# In Docker: set via AD_ADMIN_GROUP environment variable
ad.adminGroup=${AD_ADMIN_GROUP:}

# =============================================================================
# HYPER-V SERVERS CONFIGURATION
# =============================================================================

# Server 1 (Required for operation)
# In Docker: set via SERVER1_NAME, SERVER1_HOST, SERVER1_USERNAME, SERVER1_PASSWORD
app.teams[0].serverName=${SERVER1_NAME:SERVER1}
app.teams[0].serverAddress=${SERVER1_HOST:}
app.teams[0].serverUsername=${SERVER1_USERNAME:}
app.teams[0].serverPassword=${SERVER1_PASSWORD:}
# Console credentials (optional - for RDP connections, falls back to serverUsername/Password)
app.teams[0].consoleUsername=${SERVER1_CONSOLE_USERNAME:}
app.teams[0].consolePassword=${SERVER1_CONSOLE_PASSWORD:}

# Server 2 (Optional)
# In Docker: set via SERVER2_NAME, SERVER2_HOST, SERVER2_USERNAME, SERVER2_PASSWORD
app.teams[1].serverName=${SERVER2_NAME:SERVER2}
app.teams[1].serverAddress=${SERVER2_HOST:}
app.teams[1].serverUsername=${SERVER2_USERNAME:}
app.teams[1].serverPassword=${SERVER2_PASSWORD:}
app.teams[1].consoleUsername=${SERVER2_CONSOLE_USERNAME:}
app.teams[1].consolePassword=${SERVER2_CONSOLE_PASSWORD:}

# =============================================================================
# PERFORMANCE & TUNING
# =============================================================================

# Request timeout in milliseconds
spring.mvc.async.request-timeout=${ASYNC_TIMEOUT:120000}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:120000}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS:10}